<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1 id="heading">task manager</h1>
        <input id="taskinp" type="text" placeholder="enter task title ✍️">
        <select id="category">
        <option value="">Select Category 📥</option>
        <option value="study">📚 Study</option>
        <option value="work">💼 Work</option>
        <option value="personal">🏠 Personal</option>
         </select> 
        <button id="addbtn">add</button>
        <button id="themebtn">themes</button>
        <input id="searchinp" type="search" placeholder = "search task  🔍">
         <select id="categorysearch">
         <option value="">all 📥</option>
        <option value="study">📚 Study</option>
        <option value="work">💼 Work</option>
        <option value="personal">🏠 Personal</option>
         </select>
        <div class="counter-box">
  <p id="total"></p>
  <p id="completed"></p>
  <p id="pending"></p>
</div>
        <div class="taskcontainer"></div>
    </main>
    <script src="script.js"></script>
</body>
</html>
