<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Todo | Productivity Dashboard</title>

    <link rel="stylesheet" href="dashboard.css">

</head>

<body>

<div class="background">

    <div class="blob blob1"></div>

    <div class="blob blob2"></div>

    <div class="blob blob3"></div>

</div>

<header class="animate">

    <div class="logo">
        🚀 Productivity Dashboard
    </div>

    <nav>

        <a href="index.html">Home</a>
        <a href="todo.html">Tasks</a>
        <a href="planner.html">Planner</a>
        <a href="weather.html">Weather</a>

    </nav>

    <button id="themeBtn">🌙</button>

</header>

<main class="dashboard">

<section class="todo animate">

    <div class="todo-header">

        <h2>📝 Todo List</h2>

        <button id="addTaskBtn">
            + Add Task
        </button>

    </div>

    <div class="todo-input">

        <input
            type="text"
            id="taskInput"
            placeholder="Enter your task..."
        >

        <input
            type="time"
            id="taskTime"
        >

        <select id="priority">

            <option value="important">
                ⭐ Important
            </option>

            <option value="not-important">
                📌 Not Important
            </option>

        </select>

    </div>

    <div class="task-container">

    </div>

</section>

</main>

<footer class="footer">

    <div class="footer-content">

        <div class="footer-logo">

            <h3>🚀 Productivity Dashboard</h3>

            <p>
                Organize your day. Achieve your goals.
            </p>

        </div>

        <div class="footer-links">

            <a href="index.html">Home</a>
            <a href="todo.html">Todo</a>
            <a href="planner.html">Planner</a>
            <a href="weather.html">Weather</a>
            <a href="pomodoro.html">Pomodoro</a>
            <a href="goals.html">Goals</a>

        </div>

    </div>

    <hr>

    <div class="footer-bottom">

        <p>
            © 2026 Productivity Dashboard • Made with ❤️ by <strong>Rohit</strong>
        </p>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="dashboard.js"></script>

</body>

</html>
