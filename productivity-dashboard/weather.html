<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>

    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="background">

    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

</div>

<header class="animate">

    <div class="logo">
        🚀 Productivity Dashboard
    </div>

    <nav>

        <a href="index.html">Home</a>
        <a href="todo.html">Tasks</a>
        <a href="planner.html">Planner</a>
        <a href="weather.html">Weather</a>

    </nav>

    <button id="themeBtn">🌙</button>

</header>

<main class="dashboard">

<section class="weather animate">

    <div class="weather-header">

        <h2>🌤 Weather</h2>

        <button id="refreshWeather">Refresh</button>

    </div>

    <div class="weather-search">

        <input
            type="text"
            id="cityInput"
            placeholder="🔍 Search City..."
        >

        <button id="searchWeather">

            Search

        </button>

    </div>

    <div class="weather-card">

        <div class="weather-top">

            <h1 id="temperature">

                28°C

            </h1>

            <img
                src="https://cdn-icons-png.flaticon.com/512/869/869869.png"
                alt="weather"
            >

        </div>

        <div class="weather-info">

            <h3 id="city">

                Khatima

            </h3>

            <p id="condition">

                Partly Cloudy

            </p>

        </div>

        <div class="weather-details">

            <div>

                <span>💧</span>

                <p>Humidity</p>

                <h4 id="humidity">65%</h4>

            </div>

            <div>

                <span>💨</span>

                <p>Wind</p>

                <h4 id="wind">12 km/h</h4>

            </div>

        </div>

    </div>

</section>

</main>

<footer class="footer">

    <div class="footer-content">

        <div class="footer-logo">

            <h3>🚀 Productivity Dashboard</h3>

            <p>
                Organize your day. Achieve your goals.
            </p>

        </div>

        <div class="footer-links">

            <a href="index.html">Home</a>
            <a href="todo.html">Todo</a>
            <a href="planner.html">Planner</a>
            <a href="weather.html">Weather</a>
            <a href="pomodoro.html">Pomodoro</a>
            <a href="goals.html">Goals</a>

        </div>

    </div>

    <hr>

    <div class="footer-bottom">

        <p>
            © 2026 Productivity Dashboard • Made with ❤️ by <strong>Rohit</strong>
        </p>

    </div>

</footer>

<script src="dashboard.js"></script>
<script src="weather.js"></script>

</body>
</html>
